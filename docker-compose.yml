services:
  dds-bench:
    build:
      context: .           # 현재 폴더(Root)를 컨텍스트로 설정
      dockerfile: docker/Dockerfile  # Dockerfile의 실제 위치 지정
    container_name: dds_research_env
    network_mode: host     # DDS 성능 손실 방지
    privileged: true
    volumes:
      # 로컬:컨테이너 내부 경로 매핑
      - ./workspace:/root/workspace
      - ./configs:/root/configs
      - ./scripts:/root/scripts
      - ./results:/root/results
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    stdin_open: true
    tty: true
